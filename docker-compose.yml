version: "3.9"

services:
  mysql:
    image: mysql:9.0
    container_name: zap_resume_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: 'zap_resume'
      MYSQL_ROOT_PASSWORD: 'root'
    ports:
      - "3306:3306"
    volumes:
      - zap_resume_mysql_data:/var/lib/mysql

volumes:
  zap_resume_mysql_data:
