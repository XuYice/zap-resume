version: "3.9"

services:
  mysql:
    image: mysql:9.0
    container_name: zap_resume_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: 'zap_resume'
      MYSQL_ROOT_PASSWORD: 'root'
    ports:
      - "3306:3306"
    volumes:
      - zap_resume_mysql_data:/var/lib/mysql

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: zap_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=minha_senha_super_secreta
    volumes:
      - zap_evolution_data:/evolution/instances

  # --- O SEU SERVIDOR LARAVEL ---
  app:
    build: .
    container_name: zap_resume_app
    restart: unless-stopped
    # Roda o artisan serve liberando para qualquer rede acessar
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mysql

  # --- O SEU TRABALHADOR DE FILAS ---
  worker:
    build: .
    container_name: zap_resume_worker
    restart: unless-stopped
    command: php artisan queue:work
    volumes:
      - .:/app
    depends_on:
      - mysql

volumes:
  zap_resume_mysql_data:
  zap_evolution_data:
